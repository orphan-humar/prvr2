name: Phoenix V100
on:
  workflow_dispatch:

jobs:
  run-loop:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine-id: [1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Install Xvfb for the virtual display backend
          sudo apt-get install -y xvfb
          pip install playwright playwright-stealth pyvirtualdisplay
          playwright install chromium

      - name: 🔥 Run Phoenix Engine
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MACHINE_ID: ${{ matrix.machine-id }}
        run: |
          # Stagger start times to avoid hitting API limits simultaneously
          DELAY=$(( (MACHINE_ID - 1) * 30 ))
          sleep $DELAY
          
          # Run Python - the script now manages the display internally via pyvirtualdisplay
          python -u main.py
