name: Phoenix V100 (5-Machine Matrix)

on:
  workflow_dispatch:
  push:
    branches:
      - main 

permissions:
  actions: write
  contents: read

jobs:
  run-loop:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine-id: [1, 2, 3]
      fail-fast: false 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Run Engine Matrix
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GROUP_URL: ${{ secrets.GROUP_URL }}
          MACHINE_ID: ${{ matrix.machine-id }}
          PYTHONUNBUFFERED: "1" 
        run: |
          python -u main.py

  restart:
    needs: run-loop
    # 'success()' ensures it only restarts if the loop finishes successfully
    # If you click 'Cancel', this job is skipped and the loop ends.
    if: success() 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Trigger Next Run
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run "Phoenix V100 (5-Machine Matrix)" --ref main
